<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | rizallazis.xyz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 2rem;
            z-index: 1;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 2rem;
            color: #38bdf8;
            text-transform: lowercase;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            max-width: 500px;
            margin: 0 auto 2.5rem;
            line-height: 1.6;
        }

        /* Animasi Loader */
        .loader {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 2rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #38bdf8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #475569;
        }

        /* Background Decor */
        .circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, rgba(15, 23, 42, 0) 70%);
            border-radius: 50%;
            filter: blur(40px);
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="circle" style="top: -100px; right: -100px;"></div>
    <div class="circle" style="bottom: -100px; left: -100px;"></div>

    <div class="container">
        <div class="logo">rizallazis.xyz</div>
        
        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <h1>Sedang Pemeliharaan</h1>
        <p>Kami sedang memperbarui sistem untuk memberikan pengalaman yang lebih baik. Silakan cek kembali beberapa saat lagi.</p>

        <div class="footer">
            &copy; 2026 Rizal Azis. Semua hak dilindungi.
        </div>
    </div>
</body>
</html>
